[supervisord]
nodaemon=true
user=root
logfile=/var/log/supervisord.log
pidfile=/var/run/supervisord.pid

[program:chrome-debug-1]
command=/usr/bin/chromium
    --headless=new
    --no-sandbox
    --remote-allow-origins=*
    --enable-gpu
    --ignore-gpu-blocklist
    --use-angle=vulkan
    --disable-gpu-sandbox
    --disable-dev-shm-usage
    --disable-blink-features=AutomationControlled
    --disable-breakpad
    --disable-session-crashed-bubble
    --disable-search-engine-choice-screen
    --no-first-run
    --no-service-autorun
    --no-default-browser-check
    --no-pings
    --password-store=basic
    --homepage=about:blank
    --remote-debugging-port=%(ENV_CDP_PORT_1)s
    --user-data-dir=%(ENV_CHROME_PROFILE_DIR_1)s
autostart=true
autorestart=true
stdout_logfile=/var/log/chrome-debug-1.log
stderr_logfile=/var/log/chrome-debug-1-err.log
priority=10

