# Headful Chrome with Sway + wayvnc + GPU acceleration.
#
# Pick ONE profile:
#   COMPOSE_PROFILES=amd    docker compose -f docker/docker-compose.headful.yml up
#   COMPOSE_PROFILES=intel  docker compose -f docker/docker-compose.headful.yml up
#   COMPOSE_PROFILES=nvidia docker compose -f docker/docker-compose.headful.yml up
#   COMPOSE_PROFILES=cpu    docker compose -f docker/docker-compose.headful.yml up
#
# Or just: ./docker/run-headful.sh  (auto-detects the profile for you)
#
# Runtime knobs (set in shell or docker/.env):
#   VNC_WIDTH, VNC_HEIGHT       — display resolution (default 1920x1080)
#   VOIDCRAWL_IMAGE             — pull published image instead of building locally
#                                 e.g. ghcr.io/cascadinglabs/voidcrawl:headful-latest

x-headful-base: &headful-base
  image: ${VOIDCRAWL_IMAGE:-voidcrawl-headful:local}
  build:
    context: ..
    dockerfile: docker/Dockerfile.headful
  environment: &headful-env
    CDP_PORT_1: "19222"
    CDP_PORT_2: "19223"
    CHROME_WS_URLS: "http://localhost:19222,http://localhost:19223"
    BROWSER_COUNT: "2"
    TABS_PER_BROWSER: "4"
    TAB_MAX_USES: "50"
    TAB_MAX_IDLE_SECS: "60"
    CHROME_NO_SANDBOX: "1"
    VNC_PORT: "5900"
    NOVNC_PORT: "6080"
    VNC_WIDTH: "${VNC_WIDTH:-1920}"
    VNC_HEIGHT: "${VNC_HEIGHT:-1080}"
  # Host networking so Chrome's localhost:19222 is directly accessible.
  # Chrome ignores --remote-debugging-address in recent versions,
  # always binding to 127.0.0.1 — host networking works around this.
  network_mode: host
  shm_size: "2gb"
  healthcheck:
    test: >
      curl -sf http://localhost:19222/json/version &&
      curl -sf http://localhost:19223/json/version
    interval: 10s
    timeout: 5s
    start_period: 15s
    retries: 3

services:
  # ── AMD (iGPU + discrete) ────────────────────────────────────────────
  voidcrawl-cdp-amd:
    <<: *headful-base
    profiles: ["amd"]
    devices:
      - /dev/dri:/dev/dri

  # ── Intel (iGPU) ─────────────────────────────────────────────────────
  voidcrawl-cdp-intel:
    <<: *headful-base
    profiles: ["intel"]
    devices:
      - /dev/dri:/dev/dri

  # ── NVIDIA ───────────────────────────────────────────────────────────
  # Requires: nvidia-container-toolkit installed on host
  # Requires: nvidia-drm.modeset=1 kernel param on host
  voidcrawl-cdp-nvidia:
    <<: *headful-base
    profiles: ["nvidia"]
    devices:
      - /dev/dri:/dev/dri
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]

  # ── CPU-only (no GPU, software rendering) ───────────────────────────
  voidcrawl-cdp-cpu:
    <<: *headful-base
    profiles: ["cpu"]
    environment:
      <<: *headful-env
      WLR_RENDERER: "pixman"
      WLR_RENDERER_ALLOW_SOFTWARE: "1"
