# Runtime knobs (set in shell or docker/.env):
#   VOIDCRAWL_IMAGE  — pull published image instead of building locally,
#                      e.g. ghcr.io/cascadinglabs/voidcrawl:headless-latest

services:
  voidcrawl-cdp-headless:
    image: ${VOIDCRAWL_IMAGE:-voidcrawl-headless:local}
    build:
      context: ..
      dockerfile: docker/Dockerfile
    environment:
      CHROME_WS_URLS: "http://localhost:9222,http://localhost:9223"
      BROWSER_COUNT: "2"
      TABS_PER_BROWSER: "4"
      TAB_MAX_USES: "50"
      TAB_MAX_IDLE_SECS: "60"
      CHROME_NO_SANDBOX: "1"
    # Host networking so Chrome's localhost:9222/9223 is directly reachable
    # from the host. Chrome ignores --remote-debugging-address in Chrome 121+,
    # always binding to 127.0.0.1 — host networking works around this.
    network_mode: host
    shm_size: "2gb"
    healthcheck:
      test: >
        curl -sf http://localhost:9222/json/version &&
        curl -sf http://localhost:9223/json/version
      interval: 10s
      timeout: 5s
      start_period: 10s
      retries: 3
