# Runtime knobs (set in shell or docker/.env):
#   VOIDCRAWL_IMAGE  — pull published image instead of building locally,
#                      e.g. ghcr.io/cascadinglabs/voidcrawl:headless-latest

services:
  voidcrawl-cdp-headless:
    image: ${VOIDCRAWL_IMAGE:-voidcrawl-headless:local}
    build:
      context: ..
      dockerfile: docker/Dockerfile
    environment:
      # CDP_PORT_1 / CDP_PORT_2 override the Chrome debug ports when the
      # defaults (9222/9223) are taken on the host. These are not privileged
      # ports — any free TCP port works.
      CDP_PORT_1: "${CDP_PORT_1:-9222}"
      CDP_PORT_2: "${CDP_PORT_2:-9223}"
      CHROME_WS_URLS: "http://localhost:${CDP_PORT_1:-9222},http://localhost:${CDP_PORT_2:-9223}"
      BROWSER_COUNT: "2"
      TABS_PER_BROWSER: "4"
      TAB_MAX_USES: "50"
      TAB_MAX_IDLE_SECS: "60"
      CHROME_NO_SANDBOX: "1"
      # Optional deterministic resolver override for host-network Docker setups
      # whose inherited /etc/resolv.conf points at an unreachable stub resolver.
      # Example: VOIDCRAWL_DNS_SERVERS=1.1.1.1,8.8.8.8 docker compose ...
      VOIDCRAWL_DNS_SERVERS: "${VOIDCRAWL_DNS_SERVERS:-}"
      # Chrome profile base dir. Default /tmp = ephemeral (wiped with the
      # container). Set CHROME_PROFILES_DIR=/profiles to PERSIST logins,
      # cookies, and Cloudflare clearance in the volume declared below.
      CHROME_PROFILES_DIR: "${CHROME_PROFILES_DIR:-/tmp}"
    # Host networking so Chrome's localhost:${CDP_PORT_1}/${CDP_PORT_2} is
    # directly reachable from the host. Chrome ignores
    # --remote-debugging-address in Chrome 121+, always binding to 127.0.0.1
    # — host networking works around this.
    network_mode: host
    shm_size: "2gb"
    # Chrome profiles. Mounted at /profiles; persists only when
    # CHROME_PROFILES_DIR=/profiles (default /tmp is ephemeral). Reset with
    # `docker compose -f docker/docker-compose.yml down -v`.
    volumes:
      - voidcrawl-headless-profiles:/profiles
    # Hardware GPU/WebGL: pass the DRM render node so the Chrome farm uses the
    # host's Intel/AMD GPU via Mesa (ANGLE/Vulkan) instead of SwiftShader.
    # Harmless if absent — Chrome falls back to software rendering. For NVIDIA,
    # drop this and use the nvidia-container-toolkit (`gpus: all`) instead.
    devices:
      - /dev/dri:/dev/dri
    group_add:
      # Grant access to the render node (its group GID varies by host;
      # `render` is the common name on Debian/Ubuntu/Arch).
      - "render"
    healthcheck:
      test: >
        curl -sf http://localhost:${CDP_PORT_1:-9222}/json/version &&
        curl -sf http://localhost:${CDP_PORT_2:-9223}/json/version
      interval: 10s
      timeout: 5s
      start_period: 10s
      retries: 3

volumes:
  # Persistent Chrome profiles (one subdir per browser) when
  # CHROME_PROFILES_DIR=/profiles.
  voidcrawl-headless-profiles:
