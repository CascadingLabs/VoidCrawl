name: Generate & Publish API Docs

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      exclude:
        description: "Comma-separated symbol names to exclude from API reference"
        required: false
        default: ""

jobs:
  generate-docs:
    name: Generate API reference and push to VoidCrawl-Docs
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout VoidCrawl
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Install uv
        uses: astral-sh/setup-uv@37802adc94f370d6bfd71619e3f0bf239e1f3b78 # v7
        with:
          enable-cache: true
          cache-dependency-glob: "**/pyproject.toml"

      - name: Determine version
        id: version
        run: |
          if [[ "$GITHUB_REF_NAME" == v*.*.* ]]; then
            echo "tag=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
          else
            VER=$(python3 -c "
          import re
          t = open('pyproject.toml').read()
          m = re.search(r'^version\s*=\s*\"([^\"]+)\"', t, re.MULTILINE)
          print(f'v{m.group(1)}' if m else 'unknown')
          ")
            echo "tag=${VER}" >> "$GITHUB_OUTPUT"
          fi

      - name: Generate API reference (combined)
        run: |
          uv run --no-project --with "griffe>=2" python scripts/generate_api_docs.py \
            --output api-reference.md \
            --version "${{ steps.version.outputs.tag }}" \
            --exclude "${{ github.event.inputs.exclude || '' }}"

      - name: Generate API reference (split)
        run: |
          uv run --no-project --with "griffe>=2" python scripts/generate_api_docs.py \
            --output-dir reference \
            --version "${{ steps.version.outputs.tag }}" \
            --exclude "${{ github.event.inputs.exclude || '' }}"

      - name: Upload generated docs
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7
        with:
          name: api-reference
          path: |
            api-reference.md
            reference/

      - name: Clone VoidCrawl-Docs and push
        env:
          DOCS_DEPLOY_TOKEN: ${{ secrets.DOCS_DEPLOY_TOKEN }}
          TAG: ${{ steps.version.outputs.tag }}
        run: |
          git config --global user.name  "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

          git clone "https://x-access-token:${DOCS_DEPLOY_TOKEN}@github.com/CascadingLabs/VoidCrawlDocs.git" voidcrawl-docs-repo
          cp api-reference.md voidcrawl-docs-repo/api-reference.md
          mkdir -p voidcrawl-docs-repo/reference
          cp reference/*.md voidcrawl-docs-repo/reference/

          cd voidcrawl-docs-repo
          git add api-reference.md reference/

          if git diff --cached --quiet; then
            echo "No changes to API reference — skipping commit"
          else
            git commit -m "docs: update API reference for ${TAG}"
            git push origin main
            echo "Pushed API reference to VoidCrawl-Docs"
          fi

          # Always tag so CascadingLabsFE can identify doc versions
          git tag "${TAG}"
          git push origin "${TAG}"
          echo "Tagged VoidCrawl-Docs with ${TAG}"

      - name: Trigger submodule update in CascadingLabsFE
        env:
          DOCS_DEPLOY_TOKEN: ${{ secrets.DOCS_DEPLOY_TOKEN }}
          TAG: ${{ steps.version.outputs.tag }}
        run: |
          curl -s -X POST \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${DOCS_DEPLOY_TOKEN}" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            https://api.github.com/repos/CascadingLabs/CascadingLabsFE/dispatches \
            -d "{\"event_type\": \"update-voidcrawl-docs\", \"client_payload\": {\"tag\": \"${TAG}\"}}"
