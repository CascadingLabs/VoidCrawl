name: Recover Release

on:
  workflow_dispatch:
    inputs:
      run_id:
        description: "Failed release workflow run containing the built artifacts"
        required: true
        type: string
      tag:
        description: "Existing release tag, for example v0.4.1"
        required: true
        type: string

permissions:
  actions: read
  contents: write
  id-token: write

concurrency:
  group: recover-release-${{ inputs.tag }}
  cancel-in-progress: false

jobs:
  publish-pypi:
    name: Resume voidcrawl PyPI publish
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/voidcrawl
    steps:
      - name: Download voidcrawl artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          pattern: "{wheels-*,sdist}"
          merge-multiple: true
          path: dist
          run-id: ${{ inputs.run_id }}
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Strip MCP wheels from dist
        run: |
          find dist/ -name "voidcrawl_mcp-*" -delete || true
          find dist/ -name "voidcrawl-mcp-*" -delete || true

      - name: Validate recovery artifacts
        env:
          RELEASE_TAG: ${{ inputs.tag }}
        run: |
          python - <<'PY'
          import os
          from pathlib import Path

          version = os.environ["RELEASE_TAG"].removeprefix("v")
          artifacts = [path.name for path in Path("dist").iterdir() if path.is_file()]
          assert artifacts, "no artifacts downloaded"
          assert all(name.startswith(f"voidcrawl-{version}") for name in artifacts), artifacts
          assert any("cp314t" in name for name in artifacts), "no cp314t wheels found"
          print(f"validated {len(artifacts)} voidcrawl {version} artifacts")
          PY

      - name: Publish missing files to PyPI
        uses: pypa/gh-action-pypi-publish@76f52bc884231f62b9a034ebfe128415bbaabdfc # v1
        with:
          skip-existing: true
          verbose: true

  github-release:
    name: Complete GitHub Release
    runs-on: ubuntu-latest
    needs: publish-pypi
    steps:
      - name: Download all release artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          pattern: "{wheels-*,sdist*}"
          merge-multiple: true
          path: dist
          run-id: ${{ inputs.run_id }}
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Create GitHub Release
        uses: softprops/action-gh-release@153bb8e04406b1586c6c84fc1615b65b24149a1fe # v2
        with:
          tag_name: ${{ inputs.tag }}
          files: dist/*
          fail_on_unmatched_files: true
          generate_release_notes: true
