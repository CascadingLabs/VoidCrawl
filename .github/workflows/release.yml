name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write # for GitHub Release creation
  id-token: write # for PyPI trusted publishing

jobs:
  # ── Rust checks ─────────────────────────────────────────────────────────
  rust-checks:
    name: Rust checks
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Install stable Rust toolchain
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          toolchain: stable
          components: clippy

      - name: Install nightly Rust toolchain (for rustfmt)
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          toolchain: nightly
          components: rustfmt

      - name: Rust cache
        uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2

      - name: cargo check
        run: cargo +stable check --workspace --all-targets

      - name: cargo clippy
        run: cargo +stable clippy --workspace --all-targets -- -D warnings

      - name: cargo fmt
        run: cargo +nightly fmt --all -- --check

  # ── Python tests ────────────────────────────────────────────────────────
  python-tests:
    name: Python ${{ matrix.python-version }} tests
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13", "3.14"]
    steps:
      - name: Checkout code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          toolchain: stable

      - name: Rust cache
        uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2

      - name: Install uv
        uses: astral-sh/setup-uv@d0cc045d04ccac9d8b7881df0226f9e82c39688e # v6

      - name: Install dependencies and build extension
        run: uv sync --python ${{ matrix.python-version }} --group dev

      - name: Ruff lint
        run: uv run ruff check --no-fix --exit-non-zero-on-fix

      - name: Ruff format check
        run: uv run ruff format --check

      - name: Mypy
        run: uv run mypy

      - name: Pytest
        run: uv run pytest tests/ -v

  # ── Build wheels for all platforms ──────────────────────────────────────
  build-wheels:
    name: Build (${{ matrix.target }})
    needs: [rust-checks, python-tests]
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # Linux x86_64 (manylinux)
          - runner: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            manylinux: auto

          # Linux aarch64 (cross-compile)
          - runner: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            manylinux: auto
            docker-options: -e "CFLAGS_aarch64_unknown_linux_gnu=-march=armv8-a -D__ARM_ARCH=8"

          # macOS x86_64
          - runner: macos-15-intel
            target: x86_64-apple-darwin
            manylinux: ""

          # macOS Apple Silicon
          - runner: macos-15
            target: aarch64-apple-darwin
            manylinux: ""

          # Windows x86_64
          - runner: windows-latest
            target: x86_64-pc-windows-msvc
            manylinux: ""

    steps:
      - name: Checkout code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Build wheels
        uses: PyO3/maturin-action@04ac600d27cdf7a9a280dadf7147097c42b757ad # v1
        with:
          target: ${{ matrix.target }}
          manylinux: ${{ matrix.manylinux }}
          args: >-
            --release
            --manifest-path crates/pyo3_bindings/Cargo.toml
            --out dist
            --interpreter python3.10 python3.11 python3.12 python3.13 python3.14
          sccache: "true"
          docker-options: ${{ matrix.docker-options }}

      - name: Upload wheels
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: wheels-${{ matrix.target }}
          path: dist/*.whl

  # ── Build source distribution ────────────────────────────────────────────
  build-sdist:
    name: Build sdist
    needs: [rust-checks, python-tests]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Build sdist
        uses: PyO3/maturin-action@04ac600d27cdf7a9a280dadf7147097c42b757ad # v1
        with:
          command: sdist
          args: --manifest-path crates/pyo3_bindings/Cargo.toml --out dist

      - name: Upload sdist
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: sdist
          path: dist/*.tar.gz

  # ── Publish to PyPI ──────────────────────────────────────────────────────
  publish-pypi:
    name: Publish to PyPI
    runs-on: ubuntu-latest
    needs: [build-wheels, build-sdist]
    environment:
      name: pypi
      url: https://pypi.org/p/voidcrawl
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          merge-multiple: true
          path: dist

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@76f52bc884231f62b9a034ebfe128415bbaabdfc # v1
        # Uses OIDC trusted publishing — no token needed if configured on PyPI

  # ── Create GitHub Release ────────────────────────────────────────────────
  github-release:
    name: GitHub Release
    runs-on: ubuntu-latest
    needs: [build-wheels, build-sdist]
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          merge-multiple: true
          path: dist

      - name: Create GitHub Release
        uses: softprops/action-gh-release@153bb8e04406b158c6c84fc1615b65b24149a1fe # v2
        with:
          files: dist/*
          generate_release_notes: true
