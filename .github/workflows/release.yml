name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write # for GitHub Release creation
  id-token: write # for PyPI trusted publishing

jobs:
  # ── Rust checks ─────────────────────────────────────────────────────────
  rust-checks:
    name: Rust checks
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Install stable Rust toolchain
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          toolchain: stable
          components: clippy

      - name: Install nightly Rust toolchain (for rustfmt)
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          toolchain: nightly
          components: rustfmt

      - name: Rust cache
        uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2

      - name: cargo check
        run: cargo +stable check --workspace --all-targets

      - name: cargo clippy
        run: cargo +stable clippy --workspace --all-targets -- -D warnings

      - name: cargo fmt
        run: cargo +nightly fmt --all -- --check

  # ── Python tests ────────────────────────────────────────────────────────
  python-tests:
    name: Python ${{ matrix.python-version }} tests
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13", "3.14"]
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          toolchain: stable

      - name: Rust cache
        uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2

      - name: Install uv
        uses: astral-sh/setup-uv@37802adc94f370d6bfd71619e3f0bf239e1f3b78 # v7

      - name: Install dependencies and build extension
        run: uv sync --python ${{ matrix.python-version }} --group dev

      - name: Ruff lint
        run: uv run ruff check --no-fix --exit-non-zero-on-fix

      - name: Ruff format check
        run: uv run ruff format --check

      - name: Mypy
        run: uv run mypy

      - name: Pytest
        run: uv run pytest tests/ -v

  # ── Build wheels for all platforms ──────────────────────────────────────
  build-wheels:
    name: Build (${{ matrix.target }})
    needs: [rust-checks, python-tests]
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # Linux x86_64 (manylinux)
          - runner: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            manylinux: auto

          # Linux aarch64 (cross-compile)
          - runner: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            manylinux: auto
            docker-options: -e "CFLAGS_aarch64_unknown_linux_gnu=-march=armv8-a -D__ARM_ARCH=8"

          # macOS x86_64
          - runner: macos-15-intel
            target: x86_64-apple-darwin
            manylinux: ""

          # macOS Apple Silicon
          - runner: macos-15
            target: aarch64-apple-darwin
            manylinux: ""

          # Windows x86_64
          - runner: windows-latest
            target: x86_64-pc-windows-msvc
            manylinux: ""

          # Windows x86
          - runner: windows-latest
            target: i686-pc-windows-msvc
            manylinux: ""

          # Windows ARM64
          - runner: windows-11-arm
            target: aarch64-pc-windows-msvc
            manylinux: ""

          # Linux i686 (cross-compile)
          - runner: ubuntu-latest
            target: i686-unknown-linux-gnu
            manylinux: auto

          # Linux ARMv7 (cross-compile)
          - runner: ubuntu-latest
            target: armv7-unknown-linux-gnueabihf
            manylinux: auto

          # Linux PPC64LE (cross-compile)
          - runner: ubuntu-latest
            target: powerpc64le-unknown-linux-gnu
            manylinux: auto

          # Linux RISCV64 (cross-compile)
          - runner: ubuntu-latest
            target: riscv64gc-unknown-linux-gnu
            manylinux: auto

          # Linux S390x (cross-compile)
          - runner: ubuntu-latest
            target: s390x-unknown-linux-gnu
            manylinux: auto

          # Linux x86_64 MUSL
          - runner: ubuntu-latest
            target: x86_64-unknown-linux-musl
            manylinux: musllinux_1_2

          # Linux aarch64 MUSL (cross-compile)
          - runner: ubuntu-latest
            target: aarch64-unknown-linux-musl
            manylinux: musllinux_1_2

          # Linux i686 MUSL (cross-compile)
          - runner: ubuntu-latest
            target: i686-unknown-linux-musl
            manylinux: musllinux_1_2

          # Linux ARMv7 MUSL (cross-compile)
          - runner: ubuntu-latest
            target: armv7-unknown-linux-musleabihf
            manylinux: musllinux_1_2

          # Linux RISCV64 MUSL (cross-compile)
          - runner: ubuntu-latest
            target: riscv64gc-unknown-linux-musl
            manylinux: musllinux_1_2

    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Build wheels
        uses: PyO3/maturin-action@04ac600d27cdf7a9a280dadf7147097c42b757ad # v1
        with:
          target: ${{ matrix.target }}
          manylinux: ${{ matrix.manylinux }}
          args: >-
            --release
            --manifest-path crates/pyo3_bindings/Cargo.toml
            --out dist
            --interpreter python3.10 python3.11 python3.12 python3.13 python3.14
          sccache: "true"
          docker-options: ${{ matrix.docker-options }}

      - name: Upload wheels
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7
        with:
          name: wheels-${{ matrix.target }}
          path: dist/*.whl

  # ── Build voidcrawl-mcp wheels (standalone binary package) ──────────────
  # Reduced matrix vs the extension — no Claude Code users on ppc64le/riscv.
  build-mcp-wheels:
    name: Build MCP (${{ matrix.target }})
    needs: [rust-checks]
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            manylinux: auto
          - runner: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            manylinux: auto
            docker-options: -e "CFLAGS_aarch64_unknown_linux_gnu=-march=armv8-a -D__ARM_ARCH=8"
          - runner: ubuntu-latest
            target: x86_64-unknown-linux-musl
            manylinux: musllinux_1_2
          - runner: ubuntu-latest
            target: aarch64-unknown-linux-musl
            manylinux: musllinux_1_2
          - runner: macos-15-intel
            target: x86_64-apple-darwin
            manylinux: ""
          - runner: macos-15
            target: aarch64-apple-darwin
            manylinux: ""
          - runner: windows-latest
            target: x86_64-pc-windows-msvc
            manylinux: ""
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Build wheels (bin bindings)
        uses: PyO3/maturin-action@04ac600d27cdf7a9a280dadf7147097c42b757ad # v1
        with:
          target: ${{ matrix.target }}
          manylinux: ${{ matrix.manylinux }}
          # Paths are relative to working-directory (crates/mcp_server), so
          # the manifest is just Cargo.toml. maturin picks up the sibling
          # pyproject.toml and ships the `voidcrawl-mcp` binary as a
          # py3-none-<platform> wheel.
          args: >-
            --release
            --manifest-path Cargo.toml
            --out dist
          sccache: "true"
          docker-options: ${{ matrix.docker-options }}
          working-directory: crates/mcp_server

      - name: Upload wheels
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7
        with:
          name: wheels-mcp-${{ matrix.target }}
          path: crates/mcp_server/dist/*.whl

  build-mcp-sdist:
    name: Build MCP sdist
    needs: [rust-checks]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Build sdist
        uses: PyO3/maturin-action@04ac600d27cdf7a9a280dadf7147097c42b757ad # v1
        with:
          command: sdist
          args: --manifest-path Cargo.toml --out dist
          working-directory: crates/mcp_server

      - name: Upload sdist
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7
        with:
          name: sdist-mcp
          path: crates/mcp_server/dist/*.tar.gz

  # ── Build source distribution ────────────────────────────────────────────
  build-sdist:
    name: Build sdist
    needs: [rust-checks, python-tests]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Build sdist
        uses: PyO3/maturin-action@04ac600d27cdf7a9a280dadf7147097c42b757ad # v1
        with:
          command: sdist
          args: --manifest-path crates/pyo3_bindings/Cargo.toml --out dist

      - name: Upload sdist
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7
        with:
          name: sdist
          path: dist/*.tar.gz

  # ── Publish voidcrawl to PyPI ───────────────────────────────────────────
  publish-pypi:
    name: Publish voidcrawl to PyPI
    runs-on: ubuntu-latest
    needs: [build-wheels, build-sdist]
    environment:
      name: pypi
      url: https://pypi.org/p/voidcrawl
    steps:
      - name: Download voidcrawl artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          # Only voidcrawl extension wheels + sdist — voidcrawl-mcp has
          # its own publish job below.
          pattern: "{wheels-*,sdist}"
          merge-multiple: true
          path: dist

      - name: Strip MCP wheels from dist
        # download-artifact's pattern matches "wheels-mcp-*" too; exclude
        # them before publish so PyPI only sees voidcrawl files.
        run: |
          ls dist/
          # Safety net — no-op if none match.
          find dist/ -name "voidcrawl_mcp-*" -delete || true
          find dist/ -name "voidcrawl-mcp-*" -delete || true
          ls dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@76f52bc884231f62b9a034ebfe128415bbaabdfc # v1
        # Uses OIDC trusted publishing — no token needed if configured on PyPI

  # ── Publish voidcrawl-mcp to PyPI ───────────────────────────────────────
  # First-publish prerequisite: create the `voidcrawl-mcp` project on PyPI
  # and add a Trusted Publisher entry pointing at this repo + this workflow.
  # Without that, this job fails with 403 on the very first run and you
  # need to either do a one-time token-based publish or configure the
  # publisher before tagging.
  publish-pypi-mcp:
    name: Publish voidcrawl-mcp to PyPI
    runs-on: ubuntu-latest
    needs: [build-mcp-wheels, build-mcp-sdist]
    environment:
      name: pypi-mcp
      url: https://pypi.org/p/voidcrawl-mcp
    steps:
      - name: Download MCP artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          pattern: "{wheels-mcp-*,sdist-mcp}"
          merge-multiple: true
          path: dist

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@76f52bc884231f62b9a034ebfe128415bbaabdfc # v1

  # ── Publish Rust crates to crates.io ────────────────────────────────────
  # Publishes `void_crawl_core` first, waits briefly for the crates.io
  # index to propagate, then publishes `voidcrawl-mcp` which depends on it.
  # Requires a `CARGO_REGISTRY_TOKEN` repo secret.
  publish-crates-io:
    name: Publish to crates.io
    runs-on: ubuntu-latest
    # Gate on every artifact build, not just checks. crates.io publishes are
    # immutable, so we must not push a version whose wheels/sdist failed to
    # build — that's how 0.3.1 landed on crates.io while never reaching PyPI.
    needs:
      [
        rust-checks,
        python-tests,
        build-wheels,
        build-sdist,
        build-mcp-wheels,
        build-mcp-sdist,
      ]
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          toolchain: stable

      - name: Rust cache
        uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2

      - name: Publish void_crawl_core
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        # --no-verify skips a redundant rebuild — rust-checks already covered
        # that. On failure, only swallow the "this exact version is already on
        # crates.io" case (lets a re-tag that bumps only voidcrawl-mcp succeed);
        # any other publish failure is fatal.
        run: |
          version="$(grep '^version' crates/core/Cargo.toml | head -1 | cut -d'"' -f2)"
          if cargo publish -p void_crawl_core --no-verify; then
            echo "published void_crawl_core $version"
          elif curl -fsS -H 'User-Agent: voidcrawl-ci (contact@cascadinglabs.com)' \
            "https://crates.io/api/v1/crates/void_crawl_core/$version" >/dev/null; then
            echo "void_crawl_core $version already on crates.io — skipping"
          else
            echo "::error::void_crawl_core publish failed and $version is not on crates.io"
            exit 1
          fi

      - name: Wait for crates.io index
        run: sleep 45

      - name: Publish voidcrawl-mcp
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: |
          version="$(grep '^version' crates/mcp_server/Cargo.toml | head -1 | cut -d'"' -f2)"
          if cargo publish -p voidcrawl-mcp --no-verify; then
            echo "published voidcrawl-mcp $version"
          elif curl -fsS -H 'User-Agent: voidcrawl-ci (contact@cascadinglabs.com)' \
            "https://crates.io/api/v1/crates/voidcrawl-mcp/$version" >/dev/null; then
            echo "voidcrawl-mcp $version already on crates.io — skipping"
          else
            echo "::error::voidcrawl-mcp publish failed and $version is not on crates.io"
            exit 1
          fi

  # ── Create GitHub Release ────────────────────────────────────────────────
  github-release:
    name: GitHub Release
    runs-on: ubuntu-latest
    needs:
      [
        build-wheels,
        build-sdist,
        build-mcp-wheels,
        build-mcp-sdist,
        publish-pypi,
        publish-pypi-mcp,
        publish-crates-io,
      ]
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          merge-multiple: true
          path: dist

      - name: Create GitHub Release
        uses: softprops/action-gh-release@153bb8e04406b158c6c84fc1615b65b24149a1fe # v2
        with:
          files: dist/*
          generate_release_notes: true
