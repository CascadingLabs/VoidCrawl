name: CI

on:
  pull_request:
    types: [opened, synchronize, reopened]
  push:
    branches:
      - main

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable

      - name: Cache Cargo registry & build
        uses: actions/cache@668228422ae6a00e4ad889ee87cd7109ec5666a7 # v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.toml') }}
          restore-keys: ${{ runner.os }}-cargo-

      - name: Check (compile)
        run: cargo check --workspace

      - name: Run tests (serial — Chrome singleton lock)
        run: cargo test -p void_crawl_core -- --test-threads=1

  build-check:
    name: Build Check (Linux)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable

      - name: Cache Cargo registry & build
        uses: actions/cache@668228422ae6a00e4ad889ee87cd7109ec5666a7 # v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-build-${{ hashFiles('**/Cargo.toml') }}
          restore-keys: ${{ runner.os }}-cargo-build-

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
        with:
          python-version: "3.14"

      - name: Install maturin
        run: pip install maturin

      - name: Build wheel (smoke test)
        run: maturin build --release --manifest-path crates/pyo3_bindings/Cargo.toml

  python-lint:
    name: Python Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Install uv
        uses: astral-sh/setup-uv@37802adc94f370d6bfd71619e3f0bf239e1f3b78 # v7

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
        with:
          python-version: "3.11"

      - name: Ruff check
        run: uv run ruff check --no-fix --exit-non-zero-on-fix

      - name: Ruff format check
        run: uv run ruff format --check

      - name: Mypy
        run: uv run mypy

  free-threaded-build-check:
    name: Build Check (Python 3.14t)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable

      - name: Set up free-threaded Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
        with:
          python-version: "3.14t"

      - name: Verify the GIL is disabled
        run: python -c "import sysconfig; assert sysconfig.get_config_var('Py_GIL_DISABLED') == 1"

      - name: Install maturin
        run: pip install maturin

      - name: Build free-threaded wheel
        run: maturin build --release --manifest-path crates/pyo3_bindings/Cargo.toml --interpreter python3.14t

      - name: Verify free-threaded wheel tag
        run: python -c "from pathlib import Path; assert list(Path('target/wheels').glob('*cp314t*.whl'))"

  python-test:
    name: Python Test (py${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13", "3.14", "3.14t"]
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable

      - name: Cache Cargo registry & build
        uses: actions/cache@668228422ae6a00e4ad889ee87cd7109ec5666a7 # v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-pytest-${{ matrix.python-version }}-${{ hashFiles('**/Cargo.toml') }}
          restore-keys: ${{ runner.os }}-cargo-pytest-${{ matrix.python-version }}-

      - name: Install uv
        uses: astral-sh/setup-uv@37802adc94f370d6bfd71619e3f0bf239e1f3b78 # v7

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Verify free-threaded runtime
        if: matrix.python-version == '3.14t'
        run: python -c "import sysconfig; assert sysconfig.get_config_var('Py_GIL_DISABLED') == 1"

      - name: Build extension
        run: uv run maturin develop --release --manifest-path crates/pyo3_bindings/Cargo.toml

      - name: Run pytest
        # GitHub runners have no working Vulkan ICD, so Chrome's forced
        # `enable-gpu` / `use-angle=vulkan` GPU process crash-loops and a cold
        # launch can run past chromiumoxide's 20s default. Give it headroom.
        env:
          CHROME_LAUNCH_TIMEOUT_SECS: "60"
        run: uv run pytest tests/ -v

  docker-build:
    name: Docker Build + Dive (${{ matrix.variant }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - variant: headless
            dockerfile: docker/Dockerfile
          - variant: headful
            dockerfile: docker/Dockerfile.headful
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - uses: docker/setup-qemu-action@29109295f81e9208d7d86ff1c6c12d2833863392 # v3
      - uses: docker/setup-buildx-action@e468171a9de216ec08956ac3ada2f0791b6bd435 # v3

      # Build a single-arch image and load it into the local Docker daemon
      # so `dive` can inspect it. Layer cache is shared with the publish
      # workflow via the `${{ matrix.variant }}` scope — no duplicate work.
      - name: Build (load for dive)
        uses: docker/build-push-action@263435318d21b8e681c14492fe198d362a7d2c83 # v6
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          platforms: linux/amd64
          load: true
          tags: voidcrawl-${{ matrix.variant }}:ci
          cache-from: type=gha,scope=${{ matrix.variant }}
          cache-to: type=gha,scope=${{ matrix.variant }},mode=max

      # Install dive directly from upstream releases rather than using a
      # third-party GitHub Action wrapper — the only well-known wrapper
      # (yuichielectric/dive-action) is unmaintained.
      - name: Install dive
        env:
          DIVE_VERSION: "0.13.1"
        run: |
          curl -fsSL "https://github.com/wagoodman/dive/releases/download/v${DIVE_VERSION}/dive_${DIVE_VERSION}_linux_amd64.deb" \
            -o /tmp/dive.deb
          sudo apt-get install -y /tmp/dive.deb
          rm /tmp/dive.deb

      - name: Dive image-efficiency gate
        env:
          CI: "true"
        run: dive voidcrawl-${{ matrix.variant }}:ci --ci-config .github/dive-ci.yml
